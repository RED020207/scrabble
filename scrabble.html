<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="icon.png">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scrabble</title>
    </head>
    <body>
        <div class="main">
            <div class="choice">Click the letters in CORRECT order and make a word!</div>
            <div class="choice" id="levelhighscore"></div>
            <div id="letters"></div>
            <div class= "header" id="score">Score: 0     Wrong: 0</div>
            <div id="ingame">
                <button id="exit" onclick="exitGame()">Back to Home</button>
                <button id="hint" onclick="showHint()">Hint</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
