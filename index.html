<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
</head>
<body>
    <div class="main">
        <div class="header">WELCOME TO WORDLE!</div>
        <div class="choice">Choose a difficulty level:</div>
        <div id="buttons">
            <button class="btn diff" id="1" onclick="window.location.href='wordle.html?runAsync=true&diff=1'">Easy</button>
            <button class="btn diff" id="2" onclick="window.location.href='wordle.html?runAsync=true&diff=2'">Medium</button>
            <button class="btn diff" id="3" onclick="window.location.href='wordle.html?runAsync=true&diff=3'">Hard</button>
            <button class="btn diff" id="4" onclick="window.location.href='wordle.html?runAsync=true&diff=4'">Very Hard</button>
            <button class="btn diff" id="5" onclick="window.location.href='wordle.html?runAsync=true&diff=5'">Insane</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
